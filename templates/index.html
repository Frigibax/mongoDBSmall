<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Markets Dashboard</title>
    <!-- Use Inter font for a modern premium feel -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <h1><span class="highlight">Global Markets</span> Live Tracker</h1>
            <p>Real-time simulation across major world indexes connected to MongoDB</p>
        </header>
        
        <div class="charts-grid" id="charts-container">
            <!-- Glassmorphic chart cards will be dynamically injected here by JS -->
        </div>
    </div>
    
    <script src="/static/js/main.js"></script>
</body>
</html>
